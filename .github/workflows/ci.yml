name: CrossByte CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Haxe test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Haxe toolchain
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: "4.3.7"

      - name: Install dependencies
        run: |
          haxelib install utest --quiet

      - name: Run Haxe unit tests
        run: haxe test.hxml

      - name: Validate sample builds
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r sample; do
            echo "::group::${sample}"
            (cd "$(dirname "$sample")" && haxe "$(basename "$sample")")
            echo "::endgroup::"
          done < <(find samples -name check.hxml -print | sort)

  cpp-audit:
    name: hxcpp compile checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Haxe toolchain
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: "4.3.7"

      - name: hxcpp
        run: haxelib install hxcpp --quiet

      - name: Type-check full C++ API surface
        run: haxe -cp src --macro "include('crossbyte')" --cpp export/audit-full --no-output

      - name: Type-check timer burst support
        run: haxe -cp src --macro "include('crossbyte._internal.system.timer.heap')" -D timer_burst_catchup --cpp export/audit-timer --no-output

  native-smoke:
    name: Native build & smoke checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Haxe toolchain
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: "4.3.7"

      - name: Install dependencies
        run: |
          haxelib install utest --quiet
          haxelib install hxcpp --quiet

      - name: Build poll backend tests
        run: haxe -cp src -cp tests -lib utest -D windows -cpp export\cpp-poll-backend-test -main crossbyte._internal.socket.poll.PollBackendTestMain

      - name: Run poll backend tests
        run: .\export\cpp-poll-backend-test\PollBackendTestMain.exe

      - name: Build HTTP client tests
        run: haxe -cp src -cp tests -lib utest -D windows -cpp export\cpp-http-client-test -main crossbyte._internal.http.HttpTestMain

      - name: Run HTTP client tests
        run: .\export\cpp-http-client-test\HttpTestMain.exe

      - name: Build HTTP server tests
        run: haxe -cp src -cp tests -lib utest -D windows -cpp export\cpp-http-server-test -main crossbyte.http.HTTPTestMain

      - name: Run HTTP server tests
        run: .\export\cpp-http-server-test\HTTPTestMain.exe

      - name: Build websocket echo sample
        working-directory: samples/websocket-echo
        run: haxe cpp.hxml

      - name: Run websocket echo sample
        working-directory: samples/websocket-echo
        run: .\build\websocket-echo\WebSocketEchoSample.exe

  libuv-extension:
    name: libuv poll backend extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CrossByte
        uses: actions/checkout@v4
        with:
          path: crossbyte

      - name: Checkout crossbyte-libuv
        uses: actions/checkout@v4
        with:
          repository: DimensionscapeOrg/crossbyte-libuv
          path: crossbyte-libuv

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: "4.3.7"

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libuv1-dev

      - name: Install haxelibs
        run: |
          haxelib install utest --quiet
          haxelib install hxcpp --quiet
          haxelib dev crossbyte ./crossbyte
          haxelib dev crossbyte-libuv ./crossbyte-libuv

      - name: Run extension non-native tests
        working-directory: crossbyte-libuv
        run: haxe test.hxml

      - name: Build extension native tests
        working-directory: crossbyte-libuv
        run: haxe native-test.hxml

      - name: Run extension native tests
        working-directory: crossbyte-libuv
        run: ./export/native-test/LibuvNativeTestMain
