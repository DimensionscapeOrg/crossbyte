name: CrossByte CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_brotli_extension:
        description: Run the optional Brotli extension CI job
        required: false
        default: false
        type: boolean
      run_lz4_extension:
        description: Run the optional LZ4 extension CI job
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Haxe test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Haxe toolchain
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: "4.3.7"

      - name: Install dependencies
        run: |
          haxelib install utest --quiet

      - name: Run Haxe unit tests
        run: haxe ci/interp-tests.hxml

      - name: Validate sample builds
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r sample; do
            echo "::group::${sample}"
            (cd "$(dirname "$sample")" && haxe "$(basename "$sample")")
            echo "::endgroup::"
          done < <(find samples -name check.hxml -print | sort)

  cpp-audit:
    name: hxcpp compile checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Haxe toolchain
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: "4.3.7"

      - name: hxcpp
        run: haxelib install hxcpp --quiet

      - name: Type-check full C++ API surface
        run: haxe ci/cpp-api-audit.hxml

      - name: Type-check timer burst support
        run: haxe ci/cpp-timer-burst-audit.hxml

  native-smoke:
    name: Native build & smoke checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Haxe toolchain
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: "4.3.7"

      - name: Install dependencies
        run: |
          haxelib install utest --quiet
          haxelib install hxcpp --quiet

      - name: Run native smoke harness
        run: haxe ci/native-tests.hxml

      - name: Run native test suite
        run: .\export\ci-native-tests\NativeSmokeMain.exe

      - name: Build websocket echo sample
        run: haxe ci/websocket-echo-sample.hxml

  libuv-extension:
    name: libuv poll backend extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CrossByte
        uses: actions/checkout@v4
        with:
          path: crossbyte

      - name: Checkout crossbyte-libuv
        uses: actions/checkout@v4
        with:
          repository: DimensionscapeOrg/crossbyte-libuv
          path: crossbyte-libuv

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: "4.3.7"

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libuv1-dev

      - name: Install haxelibs
        run: |
          haxelib install utest --quiet
          haxelib install hxcpp --quiet
          haxelib git crossbyte-libuv https://github.com/DimensionscapeOrg/crossbyte-libuv.git main

      - name: Run extension non-native tests
        working-directory: crossbyte-libuv
        run: haxe test.hxml

      - name: Build extension native tests
        working-directory: crossbyte-libuv
        run: haxe native-test.hxml

      - name: Run extension native tests
        working-directory: crossbyte-libuv
        run: ../crossbyte/export/crossbyte-libuv-native-test/LibuvNativeTestMain

  brotli-extension:
    name: Brotli native oracle extension
    if: ${{ vars.CROSSBYTE_ENABLE_BROTLI_EXTENSION_CI == 'true' || (github.event_name == 'workflow_dispatch' && inputs.run_brotli_extension) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CrossByte
        uses: actions/checkout@v4
        with:
          path: crossbyte

      - name: Checkout crossbyte-brotli
        uses: actions/checkout@v4
        with:
          repository: DimensionscapeOrg/crossbyte-brotli
          path: crossbyte-brotli

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: "4.3.7"

      - name: Install haxelibs
        run: |
          haxelib install utest --quiet
          haxelib install hxcpp --quiet
          haxelib dev crossbyte-brotli "$GITHUB_WORKSPACE/crossbyte-brotli"

      - name: Run extension non-native tests
        working-directory: crossbyte-brotli
        run: haxe test.hxml

      - name: Build extension native tests
        working-directory: crossbyte-brotli
        run: haxe native-test.hxml

      - name: Run extension native tests
        working-directory: crossbyte-brotli
        run: ../crossbyte/export/crossbyte-brotli-native-test/NativeBrotliTestMain

  lz4-extension:
    name: LZ4 native oracle extension
    if: ${{ vars.CROSSBYTE_ENABLE_LZ4_EXTENSION_CI == 'true' || (github.event_name == 'workflow_dispatch' && inputs.run_lz4_extension) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CrossByte
        uses: actions/checkout@v4
        with:
          path: crossbyte

      - name: Checkout crossbyte-lz4
        uses: actions/checkout@v4
        with:
          repository: DimensionscapeOrg/crossbyte-lz4
          path: crossbyte-lz4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: "4.3.7"

      - name: Install haxelibs
        run: |
          haxelib install utest --quiet
          haxelib install hxcpp --quiet
          haxelib dev crossbyte-lz4 "$GITHUB_WORKSPACE/crossbyte-lz4"

      - name: Run extension non-native tests
        working-directory: crossbyte-lz4
        run: haxe test.hxml

      - name: Build extension native tests
        working-directory: crossbyte-lz4
        run: haxe native-test.hxml

      - name: Run extension native tests
        working-directory: crossbyte-lz4
        run: ../crossbyte/export/crossbyte-lz4-native-test/NativeLz4TestMain
